<!DOCTYPE html>
<html lang="hu">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hitster</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="playlist-header">

    <img
        id="playlistArtwork"
        class="playlist-artwork"
        src=""
        alt="Playlist borító">

    <h1 id="appTitle">🎼 Hitster</h1>

    <p id="trackCount"></p>

    <a
        id="playlistButton"
        class="playlist-button"
        href="#"
        target="_blank">

        🎵 Apple Music lejátszási lista

    </a>

</div>

    <div class="search">

        <input
            id="trackNumber"
            type="number"
            placeholder="Kártya sorszáma">

        <button id="searchButton">
            Keresés
        </button>

    </div>

    <div id="error" class="error hidden"></div>

    <div id="result" class="card hidden">
<img
    id="artwork"
    class="track-artwork"
    src=""
    alt="Albumborító">
        <h2 id="title"></h2>

        <p>

            <strong>Zeneszerző:</strong>

            <span id="composer"></span>

        </p>

        <p>

            <strong>Előadó:</strong>

            <span id="artist"></span>

        </p>

        <p>

            <strong>Év:</strong>

            <span id="year"></span>

        </p>

        <button id="playButton">

            ▶ Megnyitás Apple Musicban

        </button>

    </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
